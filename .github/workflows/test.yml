name: Test dotfiles

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Template rendering + file deployment ─────────────────────────────────
  dry-run:
    name: Dry-run apply (${{ matrix.machineType }}, Fedora 44)
    runs-on: ubuntu-latest
    container:
      image: fedora:44

    strategy:
      matrix:
        machineType: [workstation, server]

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y git curl

      - name: Install chezmoi
        run: curl -fsLS get.chezmoi.io | sh -s -- -b /usr/local/bin

      - name: Write chezmoi config
        run: |
          mkdir -p ~/.config/chezmoi
          printf '[data]\n    machineType = "%s"\n    isFramework = false\n' \
            "${{ matrix.machineType }}" > ~/.config/chezmoi/chezmoi.toml

      - name: Dry-run apply
        # Renders all templates against a real Fedora environment and shows
        # what files would be created - fails if any template has errors
        run: chezmoi apply --dry-run --source="$GITHUB_WORKSPACE"

  # ── Shell script linting ──────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck scripts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint scripts
        # Strip chezmoi template directives before linting so shellcheck
        # sees plain bash. Lines containing {{ }} are removed; the remaining
        # shell code is checked for common errors.
        run: |
          failed=0
          for f in .chezmoiscripts/*.sh.tmpl; do
            echo "── $f"
            if ! sed '/{{/d' "$f" | shellcheck --shell=bash --severity=warning --exclude=SC2034 -; then
              failed=1
            fi
          done
          exit $failed
