# Get editor completions based on the config schema
"$schema" = "https://starship.rs/config-schema.json"
# Inserts a blank line between shell prompts
add_newline = false
format = '$username$hostname\[$directory\] $character'
right_format = """
$kubernetes\
$git_branch\
$git_commit\
$git_state\
$git_status\
$package\
$golang\
$python\
$rust\
$buf\
$memory_usage\
$gcloud\
$direnv\
$env_var\
$custom\
$sudo\
$cmd_duration\
$line_break\
$jobs\
$time\
$status\
$os\
$container\
$shell\
"""

# Replace the 'вЭѓ' symbol in the prompt with 'вЮЬ'
[character]  # The name of the module we are configuring is 'character'
success_symbol = "[вЮЬ](bold green)"  # The 'success_symbol' segment is being set to 'вЮЬ' with the color 'bold green'
error_symbol = "[вЮЬ](bold red)"

# Disable the package module, hiding it from the prompt completely
[package]
symbol = "у∞ПЧ "
disabled = true

[directory]
format = "[$path]($style)[$read_only]($read_only_style)"

[hostname]
format = "[$ssh_symbol$hostname]($style) "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = "рЯТ•"
ahead = "вђЖпЄП ${count}"
behind = "вђЗпЄП ${count}"
diverged = "рЯФА"
untracked = "рЯЂЯ"
stashed = "рЯУ¶"
modified = "вЬПпЄП"
staged = "вЮХ"
renamed = "рЯФБ"
deleted = "рЯЧСпЄП"

[golang]
symbol = "оШІ "

[gcloud]
symbol = "оЯ± "

[git_branch]
symbol = "оЬ• "

[kotlin]
symbol = "оШі "

[memory_usage]
symbol = "у∞НЫ "

[os.symbols]
Android = "пЕї "
Debian = "оЭљ "
Fedora = "оЯЩ "
Redhat = "ољЭ "
